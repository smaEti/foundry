version: "2"
linters:
  default: none
  enable:
    - bodyclose
    - errcheck
    - forbidigo
    - govet
    - iface
    - ineffassign
    - misspell
    - nilnil
    - sloglint
    - unparam
    - unused
    - staticcheck
    - godot
    - gocyclo
    - wastedassign
    - modernize
  settings:
    iface:
      enable:
        - identical
    sloglint:
      attr-only: true
    forbidigo:
      forbid:
        - pattern: fmt.Errorf
        - pattern: ^(fmt\.Print.*|print|println)$
  exclusions:
    rules:
      # ExitCode tests cover the wrap-chain path that fmt.Errorf("%w", ...)
      # exercises in real callers; using fmt.Errorf here keeps the test honest.
      - path: internal/errors/error_test\.go$
        linters:
          - forbidigo
